name: macOS Compatibility Test

on:
  push:
    branches: [ main, master, mac ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  macos-test:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies
        run: |
          brew install ffmpeg
          brew install bento4 || echo "bento4 not available in homebrew"

      - name: Install Python dependencies
        run: |
          pip install requests aiohttp pycryptodome brotli orjson qrcode Pillow
          pip install PyQt5 PyQtWebEngine || echo "PyQt5 install had issues"
          pip install browser-cookie3 || echo "browser-cookie3 install skipped"

      - name: Verify FFmpeg
        run: |
          ffmpeg -version | head -1
          which mp4decrypt || echo "mp4decrypt not in PATH"

      - name: Run comprehensive tests (17 modules)
        timeout-minutes: 18
        run: |
          python test_e2e_download.py 2>&1 | tee test_output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

      - name: Write test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  windows-test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests aiohttp pycryptodome brotli orjson qrcode Pillow
          pip install PyQt5 PyQtWebEngine || echo "PyQt5 install had issues"

      - name: Test platform_utils on Windows
        run: |
          python -c "import sys; assert sys.platform == 'win32'; from platform_utils import IS_WINDOWS, exe, get_bento4_sdk_dirname, illegal_filename_chars, platform_font; assert IS_WINDOWS == True; assert exe('ffmpeg') == 'ffmpeg.exe'; assert exe('mp4decrypt') == 'mp4decrypt.exe'; assert 'microsoft-win32' in get_bento4_sdk_dirname(); assert '*' in illegal_filename_chars(); font_family, font_size = platform_font(); assert font_family == 'Microsoft YaHei'; print('platform_utils on Windows OK')"

      - name: Test tool_manager on Windows
        run: |
          python -c "from tool_manager import ToolManager; tm = ToolManager(); print(f'Install dir: {tm.install_dir}'); assert tm.ffmpeg_path.endswith('ffmpeg.exe'); assert tm.mp4decrypt_path.endswith('mp4decrypt.exe'); print('tool_manager on Windows OK')"

      - name: Test config on Windows
        run: |
          python -c "from config import ConfigLoader; c = ConfigLoader(); print(c.config_file); print('config on Windows OK')"
