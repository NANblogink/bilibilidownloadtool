name: macOS Compatibility Test

on:
  push:
    branches: [ main, master, mac ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  macos-test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies
        run: |
          brew install ffmpeg
          brew install bento4

      - name: Install Python dependencies
        run: |
          pip install PyQt5 requests aiohttp pycryptodome brotli orjson qrcode Pillow browser-cookie3

      - name: Check Python imports
        run: |
          python -c "import sys; print(f'Platform: {sys.platform}')"
          python -c "from tool_manager import ToolManager; tm = ToolManager(); print(f'Install dir: {tm.install_dir}')"
          python -c "from tool_manager import ToolManager; tm = ToolManager(); result = tm.check_tools_installed(); print(f'FFmpeg: {result}')"
          python -c "from env_checker import check_environment; result = check_environment(); print(f'Environment: {result}')"
          python -c "from config import ConfigLoader; c = ConfigLoader(); print(f'Config file: {c.config_file}')"

      - name: Verify FFmpeg works
        run: |
          ffmpeg -version | head -1
          which mp4decrypt && mp4decrypt --version 2>&1 | head -1 || echo "mp4decrypt check skipped"

      - name: Test bilibili_parser imports
        run: |
          python -c "
          from bilibili_parser import BilibiliParser, _exe, _get_bento4_sdk_dirname
          print(f'_exe(ffmpeg) = {_exe(\"ffmpeg\")}')
          print(f'_exe(mp4decrypt) = {_exe(\"mp4decrypt\")}')
          print(f'Bento4 SDK dir = {_get_bento4_sdk_dirname()}')
          import sys
          assert _exe('ffmpeg') == 'ffmpeg', f'Expected ffmpeg on macOS, got {_exe(\"ffmpeg\")}'
          assert _exe('mp4decrypt') == 'mp4decrypt', f'Expected mp4decrypt on macOS, got {_exe(\"mp4decrypt\")}'
          print('All platform checks passed!')
          "

      - name: Test main.py can be imported (no GUI launch)
        run: |
          python -c "
          import sys
          sys.platform_check = True
          from main import _get_platform_font
          font = _get_platform_font()
          print(f'Platform font: {font.family()}, size: {font.pointSize()}')
          assert font.family() == 'PingFang SC', f'Expected PingFang SC on macOS, got {font.family()}'
          print('Font check passed!')
          "
